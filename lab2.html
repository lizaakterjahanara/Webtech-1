<!DOCTYPE html>
<html>

<head>
    <title>Registration</title>
</head>

<body>

    <h1>Registration</h1>

    <table width="100%">
        <tr>

            <!-- General Information -->
            <td width="30%" valign="top">
                <fieldset>
                    <legend>General Information:</legend>

                    <table cellpadding="10">

                        <tr>
                            <td><b>First Name</b></td>
                            <td>:</td>
                            <td><input type="text"></td>
                        </tr>

                        <tr>
                            <td><b>Last Name</b></td>
                            <td>:</td>
                            <td><input type="text"></td>
                        </tr>

                        <tr>
                            <td><b>Gender</b></td>
                            <td>:</td>
                            <td>
                                <input type="radio" name="gender">Male
                                <input type="radio" name="gender">Female
                            </td>
                        </tr>

                        <tr>
                            <td><b>Father's Name</b></td>
                            <td>:</td>
                            <td>
                                <input type="text">
                                <input type="file">
                            </td>
                        </tr>

                        <tr>
                            <td><b>Mother's Name</b></td>
                            <td>:</td>
                            <td><input type="text"></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="blood_group"> <b>Blood: </b></label>
                            </td>
                            <td>:</td>
                            <td>
                                <select>
                                    <option value="a+"> A+ </option>
                                    <option value="b=" selected> B+ </option>
                                    <option value="o+"> O+ </option>
                                    <option value="ab+=" selected> AB+ </option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="religion"> <b>Religion: </b></label>
                            </td>
                            <td>:</td>
                            <td>
                                <select>
                                    <option value="Islam"selected> Muslim </option>
                                    <option value="chirstian"selected> chirstian </option>
                                    <option value="Hindu" selected> Hindu </option>
                                </select>
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </td>

            <!-- Contact Information -->
            <td width="20%" valign="top">

                <fieldset>
                    <legend>Contact Information:</legend>

                    <table cellpadding="10">

                        <tr>
                            <td><b>Email</b></td>
                            <td>:</td>
                            <td><input type="email"></td>
                        </tr>

                        <tr>
                            <td><b>Phone/Mobile</b></td>
                            <td>:</td>
                            <td><input type="tel"></td>
                        </tr>

                        <tr>
                            <td><b>Website</b></td>
                            <td>:</td>
                            <td><input type="url"></td>
                        </tr>

                        <tr>
                            <td><b>Address</b></td>
                            <td>:</td>
                            <td>
                                <fieldset>
                                    <legend>Present Address</legend>
                                    <!-- <label for="religion"> <b>Religion: </b></label> -->
                                    <select>
                                        <option value="Bd"> Bangladesh </option>
                                        <option value="India"> India </option>
                                    </select>
                                    <!-- <label ></label> -->
                                    <select>
                                        <option value="dhk"> Dhaka </option>
                                        <option value="mumb"> Mumbai </option>
                                    </select>
                                    <br>
                                    <br>
                                    <textarea rows="4" cols="20" placeholder="Road/City/Street"></textarea>
                                    <br>
                                    <textarea placeholder="Post code"></textarea>
                                </fieldset>

                            </td>
                        </tr>

                    </table>

                </fieldset>

            </td>

            <!-- Account Information -->
            <td width="30%" valign="top">
                <fieldset>
                    <legend>Account Information</legend>

                    <table cellpadding="10">

                        <tr>
                            <td><b>Username</b></td>
                            <td>:</td>
                            <td><input type="text"></td>
                        </tr>

                        <tr>
                            <td><b>Password</b></td>
                            <td>:</td>
                            <td><input type="password"></td>
                        </tr>
                        <tr>
                            <td><b>Confirm Password</b></td>
                            <td>:</td>
                            <td><input type="password"></td>
                        </tr>
                    </table>
                </fieldset>
                <br>
                <input type="submit" value="Register">
            </td>

        </tr>
    </table>
